org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official

# The Unified Test Platform runs the tests correctly but intermittently fails to
# retrieve their results ("Failed to receive the UTP test results"), so a green
# device run is reported as a build failure and no XML is written. The legacy
# runner reports reliably; UTP buys nothing this project uses.
android.experimental.androidTest.useUnifiedTestPlatform=false
