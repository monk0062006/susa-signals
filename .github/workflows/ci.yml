name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Lets you verify iOS on demand without waiting for a push.
  workflow_dispatch:

jobs:
  web:
    name: Web (typecheck + privacy)
    runs-on: ubuntu-latest
    # The ingest tests and the survey end-to-end test both need a real database;
    # mocking Postgres would only assert that our SQL strings have not changed.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: susa_signals_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npx tsc -b packages/core packages/web

      - name: Bundle SDK
        run: npm run bundle

      # puppeteer-core never downloads a browser, so CI must supply one.
      - uses: browser-actions/setup-chrome@v1
        id: chrome
        with:
          chrome-version: stable

      - name: Database integration tests
        env:
          TEST_DATABASE_URL: postgresql://postgres:test@localhost:5432/susa_signals_test
        run: npm run test --workspace @susatest/signals-ingest

      - name: Privacy tests
        # These assert that masking redacts before bytes leave the browser.
        # A failure here is a PII leak, not a flaky test — never skip it.
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: node scripts/test-privacy.mjs

  android:
    name: Android (build + unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Unit tests
        working-directory: platforms/android
        run: ./gradlew :signals:testDebugUnitTest --no-daemon

      - name: Assemble release AAR
        working-directory: platforms/android
        run: ./gradlew :signals:assembleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-test-results
          path: platforms/android/signals/build/reports/tests/

  android-emulator:
    name: Android (instrumented tests)
    # Pinned to 22.04: ubuntu-latest is now 24.04, where the Android emulator
    # routinely fails to boot at all. This job is slow enough without also
    # being flaky.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"'             | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # These are the only tests that prove redaction actually covers pixels.
      # On the JVM android.graphics is stubbed, so Canvas draws nothing and every
      # colour assertion passes trivially - without an emulator here, the
      # guarantee is unverified between manual runs on a physical device.
      - name: Instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_2
          disable-animations: true
          emulator-boot-timeout: 900
          # Headless flags: without -no-window the emulator waits on a display
          # that CI does not have. -gpu swiftshader_indirect is the software
          # renderer, since the runner has no GPU.
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          working-directory: platforms/android
          script: ./gradlew :signals:connectedDebugAndroidTest --no-daemon

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-instrumented-results
          path: platforms/android/signals/build/outputs/androidTest-results/

  ios:
    name: iOS (build + unit tests)
    # The whole reason this workflow exists. iOS cannot be compiled on Windows or
    # Linux — Apple ships the Swift toolchain for macOS only — so this runner is
    # the only thing standing between the Swift sources and "never verified".
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Build
        run: swift build -v

      # Runs the schema, consent, queue and geometry suites. Those were kept free
      # of UIKit precisely so they execute here without a simulator.
      #
      # NOTE: this builds for macOS, where canImport(UIKit) is false — so the
      # UIKit sources are excluded from this job entirely. The simulator job
      # below is what actually compiles them.
      - name: Unit tests (logic, macOS target)
        run: swift test -v

  ios-simulator:
    name: iOS (simulator tests)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Resolve a simulator UDID
        id: sim
        # By UDID, not by name. A name with a stray character matches nothing,
        # and xcodebuild answers by silently falling back to "My Mac" - which is
        # how this job spent several runs building for macOS while reporting
        # itself as a simulator job.
        run: |
          set -o pipefail
          UDID=$(xcrun simctl list devices available --json             | python3 -c "import json,sys; d=json.load(sys.stdin)['devices']; print(next(x['udid'] for k,v in d.items() if 'iOS' in k for x in v))")
          test -n "$UDID"
          echo "udid=${UDID}" >> "$GITHUB_OUTPUT"
          xcrun simctl list devices available | grep -F "$UDID"

      # Compiles AND runs the UIKit paths - ScreenCapture, the annotation
      # renderer, the composer - which the macOS job skips entirely because
      # canImport(UIKit) is false there.
      #
      # No pipe into a formatter and no || fallback: both swallow xcodebuild's
      # exit status, and this job once reported success over a failing build for
      # exactly that reason. tee preserves it via pipefail.
      - name: Test on iOS Simulator
        run: |
          set -o pipefail
          xcodebuild test             -scheme SusaSignals             -destination "id=${{ steps.sim.outputs.udid }}"             | tee /tmp/xcodebuild.log

      # Guards the regression above. If the build silently retargets macOS the
      # UIKit sources vanish, taking the suite that proves redaction works with
      # them - while the job still goes green.
      - name: Assert it targeted iOS and ran the UIKit suite
        run: |
          grep -q -- "-apple-ios" /tmp/xcodebuild.log             || { echo "::error::wrong platform - no iOS target triple in the build log"; exit 1; }
          grep -q "Test Suite 'AnnotationRendererTests' passed" /tmp/xcodebuild.log             || { echo "::error::the UIKit suite did not run - it was compiled out"; exit 1; }
          grep -q "Test Suite 'AnalyticsTests' passed" /tmp/xcodebuild.log             || { echo "::error::the analytics suite did not run"; exit 1; }
          grep -q "Test Suite 'ReplayMaskingTests' passed" /tmp/xcodebuild.log             || { echo "::error::the replay masking suite did not run - redaction is unverified"; exit 1; }
          grep -q "Test Suite 'SurveyTests' passed" /tmp/xcodebuild.log             || { echo "::error::the survey suite did not run"; exit 1; }
          echo "confirmed: iOS target triple present, UIKit suite ran"
