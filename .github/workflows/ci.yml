name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Lets you verify iOS on demand without waiting for a push.
  workflow_dispatch:

jobs:
  web:
    name: Web (typecheck + privacy)
    runs-on: ubuntu-latest
    # The ingest tests and the survey end-to-end test both need a real database;
    # mocking Postgres would only assert that our SQL strings have not changed.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: markerio_core_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npx tsc -b packages/core packages/web

      - name: Bundle SDK
        run: npm run bundle

      # puppeteer-core never downloads a browser, so CI must supply one.
      - uses: browser-actions/setup-chrome@v1
        id: chrome
        with:
          chrome-version: stable

      - name: Database integration tests
        env:
          TEST_DATABASE_URL: postgresql://postgres:test@localhost:5432/markerio_core_test
        run: npm run test --workspace @markerio-usa/ingest

      - name: Privacy tests
        # These assert that masking redacts before bytes leave the browser.
        # A failure here is a PII leak, not a flaky test — never skip it.
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: node scripts/test-privacy.mjs

  android:
    name: Android (build + unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Unit tests
        working-directory: platforms/android
        run: ./gradlew :feedback:testDebugUnitTest --no-daemon

      - name: Assemble release AAR
        working-directory: platforms/android
        run: ./gradlew :feedback:assembleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-test-results
          path: platforms/android/feedback/build/reports/tests/

  ios:
    name: iOS (build + unit tests)
    # The whole reason this workflow exists. iOS cannot be compiled on Windows or
    # Linux — Apple ships the Swift toolchain for macOS only — so this runner is
    # the only thing standing between the Swift sources and "never verified".
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Build
        working-directory: platforms/ios
        run: swift build -v

      # Runs the schema, consent, queue and geometry suites. Those were kept free
      # of UIKit precisely so they execute here without a simulator.
      #
      # NOTE: this builds for macOS, where canImport(UIKit) is false — so the
      # UIKit sources are excluded from this job entirely. The simulator job
      # below is what actually compiles them.
      - name: Unit tests (logic, macOS target)
        working-directory: platforms/ios
        run: swift test -v

  ios-simulator:
    name: iOS (simulator build)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show available simulators
        run: xcrun simctl list devices available | head -20

      # Compiles the UIKit paths — ScreenCapture, the annotation canvas and the
      # composer — which the macOS job silently skips. Without this, "iOS
      # compiles" means only the platform-agnostic half of the package.
      - name: Build for iOS Simulator
        working-directory: platforms/ios
        run: |
          xcodebuild build             -scheme Feedback             -destination 'generic/platform=iOS Simulator'             -skipPackagePluginValidation             | xcpretty || xcodebuild build -scheme Feedback -destination 'generic/platform=iOS Simulator'
