name: release

# Publishing is tag-driven, never branch-driven. A merge to main should not be
# able to push a version to a registry that can never be unpublished.
#
#   git tag v1.0.0 && git push origin v1.0.0
#
# Swift Package Manager needs no job here: SPM has no registry, so the tag this
# workflow reacts to *is* the Swift release.
on:
  push:
    tags:
      - 'v*'

  # Manual trigger, so a channel can be exercised without burning a version.
  # Tags are permanent and npm versions cannot be reused, which makes "just tag
  # it and see" an expensive way to discover a credential is wrong.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (not necessarily released)'
        required: true
        default: '0.0.1-test'
      channel:
        description: 'Which registry to run'
        required: true
        default: 'maven'
        type: choice
        options: [maven, npm, both]
      dry_run:
        description: 'Build and validate, but do not upload'
        required: true
        default: true
        type: boolean

# Two independent registries. Neither should be able to block the other, and a
# failure in one must not leave the other half-published silently.
jobs:
  npm:
    # A tag runs everything; a manual run only what was asked for.
    if: >-
      github.event_name == 'push' ||
      contains(fromJSON('["npm","both"]'), github.event.inputs.channel)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required by `npm publish --provenance`. Provenance signs an attestation
      # linking the tarball to this commit and this workflow, so a consumer can
      # verify what they installed was built from the source it claims. Without
      # this permission npm fails the publish rather than silently skipping it.
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Derive version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          # A manual run supplies its own version; a tag run takes it from the ref.
          if [ -n "${INPUT_VERSION:-}" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          # Reject anything that is not a plain semver. A malformed tag would
          # otherwise publish a garbage version that cannot be unpublished
          # after 72 hours.
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::tag '$GITHUB_REF_NAME' is not semver"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - run: npm ci

      - name: Set workspace versions
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          npm version "$VERSION" --workspaces --no-git-tag-version --allow-same-version

          # npm publishes a "*" dependency literally — it does NOT rewrite it the
          # way pnpm rewrites workspace:*. Left alone, every install of
          # @susa/signals would resolve @susa/signals-core to whatever is newest,
          # including a future breaking major. Pin it to exactly what we ship.
          node -e '
            const fs = require("fs");
            const p = "packages/web/package.json";
            const pkg = JSON.parse(fs.readFileSync(p, "utf8"));
            pkg.dependencies["@susa/signals-core"] = process.env.VERSION;
            fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + "\n");
          '

      - run: npm run build --workspaces --if-present

      - name: Verify the tarball contains built output
        run: |
          set -euo pipefail
          # `files: ["dist"]` silently ships an empty package if the build did not
          # run. A published empty package is worse than a failed release.
          for pkg in core web; do
            test -f "packages/$pkg/dist/index.js" \
              || { echo "::error::packages/$pkg/dist/index.js missing"; exit 1; }
          done

      # Order matters: web depends on core at the exact pinned version, so core
      # must exist on the registry first or the web publish resolves nothing.
      - name: Publish @susa/signals-core
        if: github.event.inputs.dry_run != 'true'
        run: npm publish --workspace @susa/signals-core --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry run - validate the tarball without publishing
        if: github.event.inputs.dry_run == 'true'
        run: |
          set -euo pipefail
          npm publish --workspace @susa/signals-core --access public --dry-run
          npm publish --workspace @susa/signals --access public --dry-run
          echo "::notice::Dry run - nothing was published."

      - name: Publish @susa/signals
        if: github.event.inputs.dry_run != 'true'
        run: npm publish --workspace @susa/signals --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  maven:
    if: >-
      github.event_name == 'push' ||
      contains(fromJSON('["maven","both"]'), github.event.inputs.channel)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Maven Central requires the com.susatest namespace to be verified via a
      # DNS TXT record on susatest.com, which can take days. Until the secrets
      # exist this job reports skipped rather than failed: a red X on a channel
      # that simply is not provisioned yet trains people to ignore red X's.
      - name: Check Central credentials are configured
        id: creds
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${MAVEN_USERNAME:-}" ] || [ -z "${SIGNING_KEY:-}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Maven Central skipped - MAVEN_USERNAME/SIGNING_KEY not set. See PUBLISHING.md."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-java@v4
        if: steps.creds.outputs.configured == 'true'
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Derive version
        if: steps.creds.outputs.configured == 'true'
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          # A manual run supplies its own version; a tag run takes it from the ref.
          if [ -n "${INPUT_VERSION:-}" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::tag '$GITHUB_REF_NAME' is not semver"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Stage signed artifacts
        if: steps.creds.outputs.configured == 'true'
        working-directory: platforms/android
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          set -euo pipefail
          ./gradlew --no-daemon \
            :signals:publishReleasePublicationToStagingRepository \
            -Pversion="${{ steps.version.outputs.version }}"

      - name: Verify every artifact is signed
        if: steps.creds.outputs.configured == 'true'
        working-directory: platforms/android
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          DIR="signals/build/staging-repo/com/susatest/signals/$VERSION"
          test -d "$DIR" || { echo "::error::nothing staged at $DIR"; exit 1; }

          # Central rejects an unsigned bundle at validation — long after this
          # job has already reported success. Catch it here instead, where the
          # failure points at the cause.
          missing=0
          for f in "$DIR"/*.aar "$DIR"/*.jar "$DIR"/*.pom; do
            [ -e "$f" ] || continue
            test -f "$f.asc" || { echo "::error::unsigned: $(basename "$f")"; missing=1; }
          done
          [ "$missing" -eq 0 ] || exit 1

          # Central also requires sources and javadoc jars specifically.
          ls "$DIR"/*-sources.jar >/dev/null || { echo "::error::no sources jar"; exit 1; }
          ls "$DIR"/*-javadoc.jar >/dev/null || { echo "::error::no javadoc jar"; exit 1; }

          echo "staged and signed:"; ls -1 "$DIR"

      - name: Upload bundle to Central
        if: steps.creds.outputs.configured == 'true'
        working-directory: platforms/android/signals/build/staging-repo
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          zip -qr /tmp/bundle.zip com

          # The Portal API takes one bundle rather than the per-artifact PUTs the
          # retired OSSRH accepted.
          TOKEN=$(printf '%s:%s' "$MAVEN_USERNAME" "$MAVEN_PASSWORD" | base64 -w0)

          HTTP=$(curl -sS -o /tmp/resp.txt -w '%{http_code}' \
            -X POST "https://central.sonatype.com/api/v1/publisher/upload?name=susa-signals-$VERSION" \
            -H "Authorization: Bearer $TOKEN" \
            -F "bundle=@/tmp/bundle.zip")

          # curl exits 0 on a 4xx, so the status has to be asserted explicitly or
          # a rejected upload reads as a successful release.
          if [ "$HTTP" != "201" ]; then
            echo "::error::Central upload failed (HTTP $HTTP)"; cat /tmp/resp.txt; exit 1
          fi

          echo "deployment id: $(cat /tmp/resp.txt)"
          echo "Validation runs asynchronously — confirm at https://central.sonatype.com/publishing/deployments"
